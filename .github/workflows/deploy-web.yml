name: Deploy Flutter Web Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # pubspec.lock をコミットしているので、SDK も固定して解決結果を揃える。
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6

      # lib/ と pubspec.yaml は維持したまま、欠けているプラットフォーム(web 等)を生成
      - name: Generate platform files
        run: flutter create . --platforms=web --project-name dolimit

      - name: Install deps
        run: flutter pub get

      # Service Worker を無効化（--pwa-strategy=none）。SW は更新後も古い版を
      # 配信し続ける「キャッシュが更新されない」問題の主因なので、デモでは切る。
      - name: Build web
        run: flutter build web --release --pwa-strategy=none --base-href "/${{ github.event.repository.name }}/"

      # web/ は .gitignore で毎回 flutter create が生成する（アプリ名・アイコンが
      # 既定の "dolimit"/Flutter ロゴに戻る）。ここで表示名「やっとこ」と
      # assets/icon/app_icon.png を build/web に焼き込む。
      - name: Apply app name and icon (web)
        run: |
          # アイコン各サイズを元画像から生成（ImageMagick は ubuntu-latest に同梱）。
          mkdir -p build/web/icons
          convert assets/icon/app_icon.png -resize 192x192 build/web/icons/Icon-192.png
          convert assets/icon/app_icon.png -resize 512x512 build/web/icons/Icon-512.png
          convert assets/icon/app_icon.png -resize 192x192 build/web/icons/Icon-maskable-192.png
          convert assets/icon/app_icon.png -resize 512x512 build/web/icons/Icon-maskable-512.png
          convert assets/icon/app_icon.png -resize 64x64   build/web/favicon.png
          # 表示名・PWA 名を書き換え（python3 標準ライブラリのみ。pip 不要）。
          python3 - <<'PY'
          import re, json

          NAME = 'やっとこ'
          DESC = 'やっとこ — 先延ばしにしないToDo。今日やることに絞って決着させるタスク遂行アプリ'
          BG = '#F4F5F7'

          # index.html の表示名まわり
          f = 'build/web/index.html'
          html = open(f, encoding='utf-8').read()
          html = re.sub(r'<title>.*?</title>', lambda m: f'<title>{NAME}</title>', html, count=1)
          html = re.sub(r'(<meta name="apple-mobile-web-app-title" content=")[^"]*(">)',
                        lambda m: m.group(1) + NAME + m.group(2), html)
          html = re.sub(r'(<meta name="description" content=")[^"]*(">)',
                        lambda m: m.group(1) + DESC + m.group(2), html)
          open(f, 'w', encoding='utf-8', newline='').write(html)

          # manifest.json（PWA 名・色）
          mf = 'build/web/manifest.json'
          m = json.load(open(mf, encoding='utf-8'))
          m.update(name=NAME, short_name=NAME, description=DESC,
                   background_color=BG, theme_color=BG)
          json.dump(m, open(mf, 'w', encoding='utf-8'), ensure_ascii=False, indent=4)
          print('applied name and icon to build/web')
          PY

      # キャッシュバスター: エントリスクリプトと main.dart.js にコミットSHAの
      # バージョンクエリを付与し、ブラウザ/CDN の HTTP キャッシュも確実に無効化する。
      - name: Cache-bust web assets
        run: |
          V="${GITHUB_SHA}"
          sed -i "s|src=\"flutter_bootstrap.js\"|src=\"flutter_bootstrap.js?v=${V}\"|" build/web/index.html
          sed -i "s|main.dart.js\"|main.dart.js?v=${V}\"|g" build/web/flutter_bootstrap.js
          sed -i 's|<meta charset="UTF-8">|<meta charset="UTF-8">\n  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n  <meta http-equiv="Pragma" content="no-cache">\n  <meta http-equiv="Expires" content="0">|' build/web/index.html

      # 体感速度: CanvasKit(約7MB)＋本体(約3MB)の読込中は白画面になるため、
      # スピナー付きローディングを出し、Flutter の first-frame で自動的に消す。
      # 日本語グリフは実行時に gstatic から取得するので preconnect で短縮する。
      - name: Add loading screen and font preconnect
        run: |
          python3 - <<'PY'
          f = 'build/web/index.html'
          html = open(f, encoding='utf-8').read()
          preconnect = ('  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>\n'
                        '  <link rel="preconnect" href="https://fonts.googleapis.com">\n')
          if 'fonts.gstatic.com' not in html:
              html = html.replace('<meta charset="UTF-8">', '<meta charset="UTF-8">\n' + preconnect, 1)
          loader = (
            '<style>\n'
            '#dl-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#F4F5F7;color:#55575F;font-family:-apple-system,system-ui,"Hiragino Sans","Noto Sans JP",sans-serif;z-index:2}\n'
            '@media (prefers-color-scheme:dark){#dl-loader{background:#0F1013;color:#B7BAC4}}\n'
            '#dl-loader .s{width:34px;height:34px;border:3px solid rgba(128,128,128,.25);border-top-color:currentColor;border-radius:50%;animation:dl-spin .8s linear infinite;margin-bottom:14px}\n'
            '@keyframes dl-spin{to{transform:rotate(360deg)}}\n'
            '</style>\n'
            '<div id="dl-loader"><div class="s"></div><div>読み込み中…</div></div>\n'
            "<script>(function(){function d(){var e=document.getElementById('dl-loader');if(e)e.remove();}window.addEventListener('flutter-first-frame',d);setTimeout(d,15000);})();</script>\n"
          )
          anchor = '<script src="flutter_bootstrap.js'
          if 'dl-loader' not in html:
              html = html.replace(anchor, loader + anchor, 1)
          open(f, 'w', encoding='utf-8', newline='').write(html)
          print('loading screen injected')
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
