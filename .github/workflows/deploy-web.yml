name: Deploy Flutter Web Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # pubspec.lock をコミットしているので、SDK も固定して解決結果を揃える。
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6

      # lib/ と pubspec.yaml は維持したまま、欠けているプラットフォーム(web 等)を生成
      - name: Generate platform files
        run: flutter create . --platforms=web --project-name dolimit

      - name: Install deps
        run: flutter pub get

      # Service Worker を無効化（--pwa-strategy=none）。SW は更新後も古い版を
      # 配信し続ける「キャッシュが更新されない」問題の主因なので、デモでは切る。
      - name: Build web
        run: flutter build web --release --pwa-strategy=none --base-href "/${{ github.event.repository.name }}/"

      # キャッシュバスター: エントリスクリプトと main.dart.js にコミットSHAの
      # バージョンクエリを付与し、ブラウザ/CDN の HTTP キャッシュも確実に無効化する。
      - name: Cache-bust web assets
        run: |
          V="${GITHUB_SHA}"
          sed -i "s|src=\"flutter_bootstrap.js\"|src=\"flutter_bootstrap.js?v=${V}\"|" build/web/index.html
          sed -i "s|main.dart.js\"|main.dart.js?v=${V}\"|g" build/web/flutter_bootstrap.js
          sed -i 's|<meta charset="UTF-8">|<meta charset="UTF-8">\n  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n  <meta http-equiv="Pragma" content="no-cache">\n  <meta http-equiv="Expires" content="0">|' build/web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
