name: dolimit
description: "DoLimit / 今日やる枠 — タスクを溜めずに今日に決着させるタスク遂行アプリ"
publish_to: "none"
# 通知ディープリンク / 音声認識 / Pro 課金 / 一時枠拡張 を追加。
# Android は versionCode（+ の右）が上がらないとアップロードを弾かれる。
version: 0.2.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.3.2   # Web/Android/iOS 共通のローカル保存
  uuid: ^4.5.1
  intl: ^0.19.0

  # --- ネイティブ通知・バッジ・ウィジェット（Android/iOS）。Web は条件付きインポートで除外 ---
  flutter_local_notifications: ^17.2.3
  app_badge_plus: ^1.2.0      # flutter_app_badger は Dart3 非対応のため差し替え
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  home_widget: ^0.6.0         # ホーム画面ウィジェットへのデータ供給
  speech_to_text: ^7.0.0      # 音声入力（端末の音声認識）
  in_app_purchase: ^3.2.0     # Pro 課金（ストア商品 dolimit_pro）

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
