name: dolimit
description: "やっとこ — 先延ばしにしないToDo。今日やることに絞って決着させるタスク遂行アプリ"
publish_to: "none"
# 通知ディープリンク / 音声認識 / Pro 課金 / 一時枠拡張 を追加。
# Android は versionCode（+ の右）が上がらないとアップロードを弾かれる。
version: 0.2.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.3.2   # Web/Android/iOS 共通のローカル保存
  uuid: ^4.5.1
  intl: ^0.19.0

  # --- ネイティブ通知・バッジ・ウィジェット（Android/iOS）。Web は条件付きインポートで除外 ---
  flutter_local_notifications: ^17.2.3
  app_badge_plus: ^1.2.0      # flutter_app_badger は Dart3 非対応のため差し替え
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  home_widget: ^0.6.0         # ホーム画面ウィジェットへのデータ供給
  speech_to_text: ^7.0.0      # 音声入力（端末の音声認識）
  in_app_purchase: ^3.2.0     # Pro 課金（ストア商品 dolimit_pro）
  # iOS は StoreKit 2 で動く（in_app_purchase_storekit の既定）。SK2 は未処理
  # トランザクションを購読開始時に流し直さないので、SK2Transaction を直接叩いて
  # 起動時に回収する。そのために推移的依存を直接依存に格上げしている。
  in_app_purchase_storekit: ^0.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1   # アプリアイコン生成（`dart run flutter_launcher_icons`）

flutter:
  uses-material-design: true

# アプリアイコン。ネイティブ生成後に `dart run flutter_launcher_icons` を実行すると
# assets/icon/app_icon.png から各サイズを書き出す。Web デモのアイコンは
# .github/workflows/deploy-web.yml がビルド後に焼き込む（web/ は CI 生成のため）。
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#F4F5F7"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#F4F5F7"
    theme_color: "#F4F5F7"
